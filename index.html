<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #1a472a;
      font-family: 'Segoe UI', sans-serif;
    }

    .calculator {
      background: #2d6a4f;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      width: 320px;
    }

    .display {
      background: #1b4332;
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 20px;
      text-align: right;
    }

    .display .expression {
      color: #a0a0b0;
      font-size: 14px;
      min-height: 20px;
      margin-bottom: 6px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .display .result {
      color: #e0e0e0;
      font-size: 36px;
      font-weight: 300;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    button {
      background: #1b4332;
      color: #e0e0e0;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      padding: 18px 0;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    button:hover {
      background: #144026;
    }

    button:active {
      transform: scale(0.95);
    }

    button.operator {
      background: #52b788;
      color: #fff;
    }

    button.operator:hover {
      background: #40916c;
    }

    button.equals {
      background: #f4a261;
      color: #fff;
      grid-column: span 2;
    }

    button.equals:hover {
      background: #e76f51;
    }

    button.clear {
      background: #144026;
      color: #f4a261;
    }

    button.clear:hover {
      background: #0d2b19;
    }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>
    <div class="buttons">
      <button class="clear" onclick="clearAll()">AC</button>
      <button class="clear" onclick="deleteLast()">⌫</button>
      <button class="operator" onclick="inputChar('%')">%</button>
      <button class="operator" onclick="inputChar('/')">÷</button>

      <button onclick="inputChar('7')">7</button>
      <button onclick="inputChar('8')">8</button>
      <button onclick="inputChar('9')">9</button>
      <button class="operator" onclick="inputChar('*')">×</button>

      <button onclick="inputChar('4')">4</button>
      <button onclick="inputChar('5')">5</button>
      <button onclick="inputChar('6')">6</button>
      <button class="operator" onclick="inputChar('-')">−</button>

      <button onclick="inputChar('1')">1</button>
      <button onclick="inputChar('2')">2</button>
      <button onclick="inputChar('3')">3</button>
      <button class="operator" onclick="inputChar('+')">+</button>

      <button onclick="inputChar('0')">0</button>
      <button onclick="inputChar('.')">.</button>
      <button class="equals" onclick="calculate()">=</button>
    </div>
  </div>

  <script>
    let expression = '';

    function updateDisplay() {
      const exprEl = document.getElementById('expression');
      const resultEl = document.getElementById('result');

      exprEl.textContent = expression
        .replace(/\*/g, '×')
        .replace(/\//g, '÷');

      if (expression === '') {
        resultEl.textContent = '0';
        return;
      }

      try {
        const val = eval(expression);
        if (!isNaN(val) && isFinite(val)) {
          resultEl.textContent = parseFloat(val.toFixed(10)).toString();
        }
      } catch {
        // incomplete expression — keep showing last valid result
      }
    }

    function inputChar(char) {
      const operators = ['+', '-', '*', '/', '%'];
      const last = expression.slice(-1);

      // Replace trailing operator with new one
      if (operators.includes(char) && operators.includes(last)) {
        expression = expression.slice(0, -1) + char;
      } else {
        // Prevent multiple decimals in same number
        if (char === '.') {
          const parts = expression.split(/[\+\-\*\/\%]/);
          if (parts[parts.length - 1].includes('.')) return;
        }
        expression += char;
      }

      updateDisplay();
    }

    function clearAll() {
      expression = '';
      document.getElementById('result').textContent = '0';
      document.getElementById('expression').textContent = '';
    }

    function deleteLast() {
      expression = expression.slice(0, -1);
      updateDisplay();
    }

    function calculate() {
      if (!expression) return;
      try {
        const result = eval(expression);
        document.getElementById('expression').textContent =
          expression.replace(/\*/g, '×').replace(/\//g, '÷') + ' =';
        expression = parseFloat(result.toFixed(10)).toString();
        document.getElementById('result').textContent = expression;
      } catch {
        document.getElementById('result').textContent = 'Error';
        expression = '';
      }
    }

    document.addEventListener('keydown', (e) => {
      if ('0123456789.+-*/%'.includes(e.key)) inputChar(e.key);
      else if (e.key === 'Enter' || e.key === '=') calculate();
      else if (e.key === 'Backspace') deleteLast();
      else if (e.key === 'Escape') clearAll();
    });
  </script>
</body>
</html>
